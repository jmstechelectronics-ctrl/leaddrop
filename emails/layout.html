<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#0b0c0e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0b0c0e;padding:40px 0;">
<tr><td align="center">
  <table width="560" cellpadding="0" cellspacing="0" style="background:#131416;border-radius:12px;overflow:hidden;">
    <!-- Header -->
    <tr>
      <td style="padding:40px 40px 0;text-align:center;">
        <img src="https://leaddrop.com.au/logo-nav.svg" alt="LeadDrop" style="height:40px;margin-bottom:24px;">
      </td>
    </tr>
    <!-- Body -->
    <tr>
      <td style="padding:0 40px 40px;">
        <h1 style="color:#f0f0ec;font-size:24px;font-weight:700;margin:0 0 12px;text-align:center;">{subject}</h1>
        <div style="border-bottom:2px solid #eab308;width:40px;margin:0 auto 24px;"></div>
        {body}
      </td>
    </tr>
    <!-- Footer -->
    <tr>
      <td style="background:#18191b;padding:24px 40px;text-align:center;border-top:1px solid rgba(255,255,255,0.06);">
        <p style="color:#5c5c57;font-size:12px;margin:0 0 4px;">LeadDrop — Local leads, dropped.</p>
        <p style="color:#5c5c57;font-size:11px;margin:0;">
          <a href="https://leaddrop.com.au/privacy.html" style="color:#7a7a75;text-decoration:underline;">Privacy</a>
          &nbsp;&middot;&nbsp;
          <a href="https://leaddrop.com.au/terms.html" style="color:#7a7a75;text-decoration:underline;">Terms</a>
          &nbsp;&middot;&nbsp; 
          <a href="mailto:info@leaddrop.com.au" style="color:#7a7a75;text-decoration:underline;">info@leaddrop.com.au</a>
        </p>
      </td>
    </tr>
  </table>
</td></tr>
</table>
</body>
</html>
